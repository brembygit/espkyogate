# Test: Button and switch control platforms (including new features)
# Validates: typed switch platform, all button types (old + new) compile

external_components:
  - source:
      type: local
      path: ../components
    components: [bentel_kyo]

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

esphome:
  name: test-controls
  friendly_name: Test Controls

uart:
  id: uart_bus
  tx_pin: GPIO5
  rx_pin: GPIO4
  baud_rate: 9600
  data_bits: 8
  parity: EVEN

logger:
  level: DEBUG
  baud_rate: 0

api:

ota:
  platform: esphome

wifi:
  ssid: "test_ssid"
  password: "test_password"

# NTP time source (required for sync_datetime button)
time:
  - platform: sntp
    id: sntp_time

bentel_kyo:
  id: kyo
  uart_id: uart_bus

alarm_control_panel:
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    name: "Partition 1"
    partition: 1
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    name: "Partition 2"
    partition: 2
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    name: "Partition 3"
    partition: 3

# ========================================
# Switches (typed schema)
# ========================================

switch:
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: polling
    name: "Panel Polling"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: serial_trace
    name: "Serial Trace Log"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: log_trace
    name: "State Change Log"

# ========================================
# Buttons (all types)
# ========================================

button:
  # --- Original button types ---
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: reread_config
    name: "Reread Config"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_all_away
    name: "Arm All Away"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_all_home
    name: "Arm All Home"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_all_night
    name: "Arm All Night"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: disarm_all
    name: "Disarm All"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_preset
    name: "Preset Mixed"
    partitions:
      1: away
      2: night
      3: disarm
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: reset_alarms
    name: "Reset Alarms"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: read_event_log
    name: "Read Event Log"

  # --- New button types ---
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: activate_output
    output_number: 1
    name: "Activate Output 1"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: deactivate_output
    output_number: 4
    name: "Deactivate Output 4"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: pulse_output
    output_number: 2
    pulse_time: 1500ms
    name: "Pulse Output 2"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: include_zone
    zone_number: 1
    name: "Include Zone 1"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: exclude_zone
    zone_number: 5
    name: "Exclude Zone 5"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: sync_datetime
    name: "Sync Panel Clock"
