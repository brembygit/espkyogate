#            all buttons (arm, output, zone, datetime), all switches (polling, trace)

external_components:
  - source:
      type: local
      path: ../components
    components: [bentel_kyo]

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

esphome:
  name: test-full
  friendly_name: Test Full

uart:
  id: uart_bus
  tx_pin: GPIO5
  rx_pin: GPIO4
  baud_rate: 9600
  data_bits: 8
  parity: EVEN

logger:
  level: DEBUG
  baud_rate: 0

api:

ota:
  platform: esphome

wifi:
  ssid: "test_ssid"
  password: "test_password"

# NTP time source (required for sync_datetime)
time:
  - platform: sntp
    id: sntp_time

bentel_kyo:
  id: kyo
  uart_id: uart_bus

# ========================================
# Alarm Control Panels
# ========================================

alarm_control_panel:
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    name: "Partition 1"
    partition: 1
    entry_delay:
      name: "Partition 1 Entry Delay"
    exit_delay:
      name: "Partition 1 Exit Delay"
    siren_timer:
      name: "Partition 1 Siren Timer"

  - platform: bentel_kyo
    bentel_kyo_id: kyo
    name: "Partition 2"
    partition: 2

# ========================================
# Binary Sensors (all types)
# ========================================

binary_sensor:
  - platform: bentel_kyo
    bentel_kyo_id: kyo

    zones:
      - zone: 1
        name: "Zone 1"
        device_class: motion
        zone_type:
          name: "Zone 1 Type"
        panel_name:
          name: "Zone 1 Panel Name"
        zone_partition:
          name: "Zone 1 Partition"
        serial_number:
          name: "Zone 1 Serial Number"
      - zone: 2
        name: "Zone 2"
        device_class: door

    zone_tamper:
      - zone: 1
        name: "Zone 1 Tamper"

    zone_bypass:
      - zone: 1
        name: "Zone 1 Bypass"

    zone_alarm_memory:
      - zone: 1
        name: "Zone 1 Alarm Memory"

    zone_tamper_memory:
      - zone: 1
        name: "Zone 1 Tamper Memory"

    warnings:
      mains_failure:
        name: "Mains Failure"
      bpi_missing:
        name: "BPI Missing"
      fuse_fault:
        name: "Fuse Fault"
      low_battery:
        name: "Low Battery"
      phone_line_fault:
        name: "Phone Line Fault"
      default_codes:
        name: "Default Codes"
      wireless_fault:
        name: "Wireless Fault"

    tamper:
      tamper_zone:
        name: "Zone Tamper"
      tamper_false_key:
        name: "False Key Tamper"
      tamper_bpi:
        name: "BPI Tamper"
      tamper_system:
        name: "System Tamper"
      tamper_rf_jam:
        name: "RF Jam"
      tamper_wireless:
        name: "Wireless Tamper"

    communication:
      name: "Panel Communication"

    siren:
      name: "Siren"

    output_state:
      - output_number: 1
        name: "Output 1"
        panel_name:
          name: "Output 1 Panel Name"
      - output_number: 2
        name: "Output 2"

# ========================================
# Text Sensors
# ========================================

text_sensor:
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    firmware_version:
      name: "Firmware Version"
    alarm_model:
      name: "Alarm Model"
    keyfobs:
      - slot: 1
        name: "Keyfob 1"

# ========================================
# Switches (all three typed types)
# ========================================

switch:
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: polling
    name: "Panel Polling"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: serial_trace
    name: "Serial Trace Log"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: log_trace
    name: "State Change Log"

# ========================================
# Buttons (all types)
# ========================================

button:
  # Management
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: reread_config
    name: "Reread Config"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: reset_alarms
    name: "Reset Alarms"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: read_event_log
    name: "Read Event Log"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: memory_scan
    name: "Memory Scan"

  # Arming
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_all_away
    name: "Arm All Away"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: disarm_all
    name: "Disarm All"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: arm_preset
    name: "Preset Mixed"
    partitions:
      1: away
      2: home
      3: night
      4: disarm

  # Output control (NEW)
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: activate_output
    output_number: 1
    name: "Activate Output 1"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: deactivate_output
    output_number: 1
    name: "Deactivate Output 1"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: pulse_output
    output_number: 1
    pulse_time: 1000ms
    name: "Pulse Output 1"

  # Zone control (NEW)
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: include_zone
    zone_number: 1
    name: "Include Zone 1"
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: exclude_zone
    zone_number: 1
    name: "Exclude Zone 1"

  # Datetime sync (NEW)
  - platform: bentel_kyo
    bentel_kyo_id: kyo
    type: sync_datetime
    name: "Sync Panel Clock"
